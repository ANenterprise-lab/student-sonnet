<div class="register-container">
  <div class="register-card">
    <h1>Register</h1>
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label for="first_name">First Name</label>
          <input 
            type="text" 
            id="first_name" 
            formControlName="first_name"
            class="form-control"
            [class.error]="first_name?.invalid && first_name?.touched"
          >
          <div class="error-message" *ngIf="first_name?.invalid && first_name?.touched">
            <span *ngIf="first_name?.errors?.['required']">First name is required</span>
          </div>
        </div>

        <div class="form-group">
          <label for="last_name">Last Name</label>
          <input 
            type="text" 
            id="last_name" 
            formControlName="last_name"
            class="form-control"
            [class.error]="last_name?.invalid && last_name?.touched"
          >
          <div class="error-message" *ngIf="last_name?.invalid && last_name?.touched">
            <span *ngIf="last_name?.errors?.['required']">Last name is required</span>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <input 
          type="text" 
          id="username" 
          formControlName="username"
          class="form-control"
          [class.error]="username?.invalid && username?.touched"
        >
        <div class="error-message" *ngIf="username?.invalid && username?.touched">
          <span *ngIf="username?.errors?.['required']">Username is required</span>
          <span *ngIf="username?.errors?.['minlength']">Username must be at least 3 characters</span>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email"
          class="form-control"
          [class.error]="email?.invalid && email?.touched"
        >
        <div class="error-message" *ngIf="email?.invalid && email?.touched">
          <span *ngIf="email?.errors?.['required']">Email is required</span>
          <span *ngIf="email?.errors?.['email']">Please enter a valid email</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password"
          class="form-control"
          [class.error]="password?.invalid && password?.touched"
        >
        <div class="error-message" *ngIf="password?.invalid && password?.touched">
          <span *ngIf="password?.errors?.['required']">Password is required</span>
          <span *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters</span>
        </div>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button 
        type="submit" 
        class="btn btn-primary"
        [disabled]="registerForm.invalid || isLoading"
      >
        <span *ngIf="isLoading">Loading...</span>
        <span *ngIf="!isLoading">Register</span>
      </button>
    </form>

    <div class="auth-links">
      <p>Already have an account? <a routerLink="/login">Login here</a></p>
    </div>
  </div>
</div>
